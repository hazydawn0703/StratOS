name: Publish create-finance-app

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  publish:
    if: github.event_name == 'workflow_dispatch' || github.event.release.target_commitish == 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: packages/create-finance-app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Show package metadata
        run: npm pkg get name version bin files publishConfig

      - name: Dry run pack
        run: npm pack --dry-run

      - name: Publish to npm (trusted publishing)
        run: npm publish --provenance --access public
